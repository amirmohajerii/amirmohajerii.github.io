<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A Mohajeri</title>
  <link rel="icon" type="image/webp" sizes="63x63" href="A.M.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0d0d0d;
      color: #c0c0c0;
      font-family: "JetBrains Mono", monospace;
      font-weight: 500;
      line-height: 1.4;
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
    }

    .crt-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #0d0d0d;
      overflow: hidden;
    }

    #boot-screen {
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      font-size: 14px;
      color: #999;
    }

    #terminal {
      padding: 20px;
      padding-bottom: 72px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      display: none;
      scroll-behavior: smooth;
    }

    #terminal::-webkit-scrollbar, #boot-screen::-webkit-scrollbar {
      width: 8px;
    }

    #terminal::-webkit-scrollbar-track, #boot-screen::-webkit-scrollbar-track {
      background: #0d0d0d;
    }

    #terminal::-webkit-scrollbar-thumb, #boot-screen::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    #terminal::-webkit-scrollbar-thumb:hover, #boot-screen::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .line {
      display: flex;
      position: relative;
      z-index: 1;
    }

    .prompt {
      margin-right: 5px;
      white-space: nowrap;
      color: #e0e0e0;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      caret-color: #e0e0e0;
      caret-shape: block;
    }

    input:focus {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { caret-color: #e0e0e0; }
      50% { caret-color: transparent; }
    }

    img {
      max-width: 400px;
      display: block;
      margin-top: 5px;
    }
    
    svg {
      width: 48px;
      height: 48px;
    }

    .banner {
      font-family: 'JetBrains Mono', 'Courier New', 'Consolas', monospace !important;
      font-size: 10px !important;
      line-height: 10px !important;
      white-space: pre !important;
      display: inline-block !important;
      font-weight: 700 !important;
      letter-spacing: 0px !important;
      word-spacing: 0px !important;
      text-rendering: geometricPrecision !important;
      -webkit-font-smoothing: none !important;
      -moz-osx-font-smoothing: unset !important;
      transform: scale(1) !important;
    }

    @keyframes screenFlash {
      0% { background: #0d0d0d; }
      50% { background: #ddd; }
      100% { background: #0d0d0d; }
    }

    .banner-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 30px;
    }

    .banner-image {
      width: 120px;
      height: 120px;
      border: 2px solid #3b82f6;
      border-radius: 4px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }

    .flash {
      animation: screenFlash 0.1s;
    }

    /* --- GLOBAL RESPONSIVE FIXES --- */
    #terminal, #boot-screen {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .line {
      display: flex;
      position: relative;
      z-index: 1;
      flex-wrap: wrap; /* Allows text input to wrap if screen is too narrow */
      width: 100%;
    }

    .prompt {
      margin-right: 5px;
      white-space: pre-wrap; /* Allows long paths to wrap nicely */
      word-break: break-all;
      color: #e0e0e0;
    }

    input {
      min-width: 50px; /* Prevents input from disappearing on wrap */
    }

    /* --- TABLET & MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      #terminal, #boot-screen {
        font-size: 12px;
        padding: 10px;
        padding-bottom: 64px;
      }
      img {
        max-width: 100%;
      }
      
      /* Force banner to stay side-by-side */
      .banner-container {
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        align-items: flex-start !important;
        justify-content: space-between !important;
        gap: 8px !important;
        width: 100%;
        overflow: hidden; /* Prevent any stray pixels from causing a scrollbar */
      }
      
      /* Shrink ASCII text aggressively to fit on the left */
      .banner {
        font-size: 3.5px !important;
        line-height: 4px !important;
      }
      
      /* Shrink image to balance the smaller text */
      #banner-animation {
        width: 70px !important;
        height: 70px !important;
      }
    }

    .banner-container {
      position: sticky !important;
      top: 0 !important;
      z-index: 5 !important;
      background: #0d0d0d !important;
      padding-bottom: 8px !important;
    }

    /* --- EXTRA SMALL SCREENS (Phones) --- */
    @media (max-width: 480px) {
      .banner {
        font-size: 2.2px !important;
        line-height: 2.5px !important;
      }
      #banner-animation {
        width: 50px !important;
        height: 50px !important;
      }
      .prompt, input, #terminal, #boot-screen {
        font-size: 11px;
      }
    }
    .skills-grid {
      display: grid !important;
      grid-template-columns: repeat(6, 1fr) !important;
      gap: 10px !important;
      max-width: 580px !important;
    }

    @media (max-width: 600px) {
      .skills-grid {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }
  </style>
</head>

          break;
        case "exit":
          stopProcess();
          break;
        case "music":
        case "musicplayer":
          const bar = document.getElementById("music-player-bar");
          if (bar) {
            bar.style.display = "flex";
            print("Music player opened.");
          } else {
            print("Music player not found. Is music-player.js loaded?");
          }
          break;
        default:
          print(`command not found: ${base}`);
      }

      prompt();
    }

    function stopProcess() {
      if (activeProcess) {
        clearInterval(activeProcess);
        activeProcess = null;
        const donutEl = document.getElementById("donut-container");
        if (donutEl) donutEl.remove();
        print("Process terminated.");
      }
    }

    document.addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "c") {
        stopProcess();
        prompt();
      }
    });

    // Click anywhere to focus input
    document.addEventListener("click", (e) => {
      if (e.target.closest("#music-player-bar")) return;
      const inputs = terminal.querySelectorAll("input");
      if (inputs.length > 0) {
        inputs[inputs.length - 1].focus();
      }
    });

    function ls() {
      let dir = getDir(cwd);
      print(Object.keys(dir).join("    "));
    }

    function cd(path) {
      if (!path || path === "~") {
        cwd = "/home";
        return;
      }
      if (path.startsWith("../")) {
        let ups = path.split("/").filter(p => p === "..").length;
        let parts = cwd.split("/").filter(Boolean);
        parts = parts.slice(0, parts.length - ups);
        cwd = "/" + parts.join("/");
        if (cwd === "/") cwd = "/home";
        return;
      }
      if (path === "..") {
        let parts = cwd.split("/").filter(Boolean);
        parts.pop();
        cwd = "/" + parts.join("/");
        if (cwd === "/") cwd = "/home";
        return;
      }
      let newPath = cwd + "/" + path;
      try {
        let d = getDir(newPath);
        if (typeof d === "object") cwd = newPath;
        else print("Not a directory");
      } catch {
        print("No such directory");
      }
    }

    function cat(file) {
      let dir = getDir(cwd);
      if (!dir[file]) return print("No such file");
      let content = dir[file];
      
      if (typeof content === "string" && content.trim().startsWith("<div")) {
        const temp = document.createElement("div");
        temp.innerHTML = content;
        while (temp.firstChild) {
          terminal.appendChild(temp.firstChild);
        }
        terminal.scrollTop = terminal.scrollHeight;
      } else if (content.endsWith?.(".webp") || content.endsWith?.(".png") || content.endsWith?.(".gif")) {
        let img = document.createElement("img");
        img.src = content;
        terminal.appendChild(img);
      } else {
        print(content);
      }
    }

    function help() {
      print(`Available commands:
ls         -> list directory
cd DIR     -> change directory
cat FILE   -> read file
pwd        -> show path
clear      -> clear screen
help       -> show commands
donut      -> spinning donut animation
music      -> reopen music player`);
    }

    function donut() {
      if (activeProcess) clearInterval(activeProcess);
      let A = 0, B = 0;
      const width = 40, height = 22;
      const chars = ".,-~:;=!*#$@";
      
      // Create a container for the donut
      const donutContainer = document.createElement("div");
      donutContainer.id = "donut-container";
      donutContainer.style.whiteSpace = "pre";
      donutContainer.style.fontFamily = "monospace";
      donutContainer.style.fontSize = "12px";
      donutContainer.style.lineHeight = "1.2";
      terminal.appendChild(donutContainer);
      
      activeProcess = setInterval(() => {
        let z = Array(width * height).fill(0);
        let b = Array(width * height).fill(" ");
        for (let j = 0; j < 6.28; j += 0.07) {
          for (let i = 0; i < 6.28; i += 0.02) {
            let c = Math.sin(i), d = Math.cos(j);
            let e = Math.sin(A), f = Math.sin(j);
            let g = Math.cos(A), h = d + 2;
            let D = 1 / (c * h * e + f * g + 5);
            let l = Math.cos(i), m = Math.cos(B), n = Math.sin(B);
            let t = c * h * g - f * e;
            let x = Math.floor(width / 2 + 30 * D * (l * h * m - t * n));
            let y = Math.floor(height / 2 + 15 * D * (l * h * n + t * m));
            let o = x + width * y;
            let N = Math.floor(8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n));
            if (y >= 0 && y < height && x >= 0 && x < width && D > z[o]) {
              z[o] = D;
              b[o] = chars[Math.max(0, N)];
            }
          }
        }
        let output = "";
        for (let k = 0; k < width * height; k++) {
          output += k % width === 0 ? "\n" : b[k];
        }
        donutContainer.textContent = output;
        A += 0.04;
        B += 0.02;
      }, 50);
      // After prompt() is called in donut, add this
      setTimeout(() => {
        const lastInput = terminal.querySelectorAll("input");
        if (lastInput.length > 0) {
          lastInput[lastInput.length - 1].scrollIntoView({ block: "center", behavior: "smooth" });
        }
      }, 100);
    }

    function bootSequence() {
      const bootMessages = [
        "[ OK ] BIOS - American Megatrends Inc. v2.15.1236",
        "[ OK ] CPU: Intel(R) Core(TM) i7-9750H @ 2.60GHz",

        "[ OK ] ACPI: PCI Interrupt Link [LNKB] (IRQs 3 4 5 6 7 9 10 *11 12 14 15)",
        "[ OK ] ACPI: PCI Interrupt Link [LNKC] (IRQs 3 4 5 6 7 9 *10 11 12 14 15)",

        "[ OK ] usbcore: registered new interface driver hub",

      let index = 0;
      const bootInterval = setInterval(() => {
        if (index < bootMessages.length) {
          printBoot(bootMessages[index]);
          index++;
        } else {
          clearInterval(bootInterval);
          setTimeout(() => {
            document.querySelector('.crt-screen').classList.add('flash');
            setTimeout(() => {
              document.querySelector('.crt-screen').classList.remove('flash');
              bootScreen.style.display = 'none';
              terminal.style.display = 'block';
              printBanner();
              print("Type 'help' to see available commands.");
              prompt();
            }, 100);
          }, 500);
        }
      }, 50);
    }

    // --- GIF RESTART WITH THROTTLE ---
    let gifThrottle = false;

    function restartGif(e) {
      if (e.target && e.target.id === "banner-animation") {
        if (gifThrottle) return;
        gifThrottle = true;
        
        e.target.src = "portrait.gif?t=" + new Date().getTime();
        
        setTimeout(() => {
          gifThrottle = false;
        }, 1000);
      }
    }

    document.addEventListener("mouseover", restartGif);
    document.addEventListener("touchstart", restartGif, { passive: true });

        // Tab autocomplete - cycle through matches without printing
    const autocompleteCommands = ["ls", "cd", "cat", "pwd", "clear", "help", "donut", "exit", "music", "musicplayer"];
    let tabCycleIndex = -1;
    let tabCycleMatches = [];
    let tabCycleOriginal = "";

    document.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const inputs = terminal.querySelectorAll("input");
        if (inputs.length === 0) return;
        const input = inputs[inputs.length - 1];
        const value = input.value.trim();
        if (!value) return;
        
        const parts = value.split(" ");
        const lastPart = parts[parts.length - 1];
        
        // Reset cycle if the word being completed changed
        if (lastPart !== tabCycleOriginal || tabCycleMatches.length === 0) {
          tabCycleIndex = -1;
          tabCycleOriginal = lastPart;
          tabCycleMatches = [];
          
          if (parts.length === 1) {
            const cmdMatch = autocompleteCommands.filter(c => c.startsWith(lastPart));
            let dir;
            try { dir = getDir(cwd); } catch(err) { dir = {}; }
            const fileMatch = Object.keys(dir).filter(f => f.startsWith(lastPart));
            tabCycleMatches = [...cmdMatch, ...fileMatch];
          } else {
            let dir;
            try { dir = getDir(cwd); } catch(err) { dir = {}; }
            tabCycleMatches = Object.keys(dir).filter(f => f.startsWith(lastPart));
          }
        }
        
        if (tabCycleMatches.length === 0) return;
        
        // Cycle to next match
        tabCycleIndex = (tabCycleIndex + 1) % tabCycleMatches.length;
        
        if (parts.length === 1) {
          input.value = tabCycleMatches[tabCycleIndex] + " ";
        } else {
          parts[parts.length - 1] = tabCycleMatches[tabCycleIndex];
          input.value = parts.join(" ") + " ";
        }
      }
    });

    // Reset cycle when user types something else
    document.addEventListener("input", (e) => {
      if (e.target.tagName === "INPUT" && e.target.closest("#terminal")) {
        tabCycleIndex = -1;
        tabCycleMatches = [];
        tabCycleOriginal = "";
      }
    });

    // Initialize the boot sequence
    bootSequence();
  </script>

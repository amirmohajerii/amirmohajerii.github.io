<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A Mohajeri</title>
  <link rel="icon" type="image/webp" sizes="63x63" href="A.M.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0d0d0d;
      color: #c0c0c0;
      font-family: "JetBrains Mono", monospace;
      font-weight: 500;
      line-height: 1.4;
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
    }

    .crt-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #0d0d0d;
      overflow: hidden;
    }

    #boot-screen {
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      font-size: 14px;
      color: #999;
    }

    #terminal {
      padding: 20px;
      padding-bottom: 72px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      display: none;
      scroll-behavior: smooth;
    }

    #terminal::-webkit-scrollbar, #boot-screen::-webkit-scrollbar {
      width: 8px;
    }

    #terminal::-webkit-scrollbar-track, #boot-screen::-webkit-scrollbar-track {
      background: #0d0d0d;
    }

    #terminal::-webkit-scrollbar-thumb, #boot-screen::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    #terminal::-webkit-scrollbar-thumb:hover, #boot-screen::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .line {
      display: flex;
      position: relative;
      z-index: 1;
    }

    .prompt {
      margin-right: 5px;
      white-space: nowrap;
      color: #e0e0e0;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      caret-color: #e0e0e0;
      caret-shape: block;
    }

    input:focus {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { caret-color: #e0e0e0; }
      50% { caret-color: transparent; }
    }

    img {
      max-width: 400px;
      display: block;
      margin-top: 5px;
    }
    
    svg {
      width: 48px;
      height: 48px;
    }

    .banner {
      font-family: 'JetBrains Mono', 'Courier New', 'Consolas', monospace !important;
      font-size: 10px !important;
      line-height: 10px !important;
      white-space: pre !important;
      display: inline-block !important;
      font-weight: 700 !important;
      letter-spacing: 0px !important;
      word-spacing: 0px !important;
      text-rendering: geometricPrecision !important;
      -webkit-font-smoothing: none !important;
      -moz-osx-font-smoothing: unset !important;
      transform: scale(1) !important;
    }

    @keyframes screenFlash {
      0% { background: #0d0d0d; }
      50% { background: #ddd; }
      100% { background: #0d0d0d; }
    }

    .banner-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 30px;
    }

    .banner-image {
      width: 120px;
      height: 120px;
      border: 2px solid #3b82f6;
      border-radius: 4px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }

    .flash {
      animation: screenFlash 0.1s;
    }

    /* --- GLOBAL RESPONSIVE FIXES --- */
    #terminal, #boot-screen {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .line {
      display: flex;
      position: relative;
      z-index: 1;
      flex-wrap: wrap; /* Allows text input to wrap if screen is too narrow */
      width: 100%;
    }

    .prompt {
      margin-right: 5px;
      white-space: pre-wrap; /* Allows long paths to wrap nicely */
      word-break: break-all;
      color: #e0e0e0;
    }

    input {
      min-width: 50px; /* Prevents input from disappearing on wrap */
    }

    /* --- TABLET & MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      #terminal, #boot-screen {
        font-size: 12px;
        padding: 10px;
        padding-bottom: 64px;
      }
      img {
        max-width: 100%;
      }
      
      /* Force banner to stay side-by-side */
      .banner-container {
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        align-items: flex-start !important;
        justify-content: space-between !important;
        gap: 8px !important;
        width: 100%;
        overflow: hidden; /* Prevent any stray pixels from causing a scrollbar */
      }
      
      /* Shrink ASCII text aggressively to fit on the left */
      .banner {
        font-size: 3.5px !important;
        line-height: 4px !important;
      }
      
      /* Shrink image to balance the smaller text */
      #banner-animation {
        width: 70px !important;
        height: 70px !important;
      }
    }

    .banner-container {
      position: sticky !important;
      top: 0 !important;
      z-index: 5 !important;
      background: #0d0d0d !important;
      padding-bottom: 8px !important;
    }

    /* --- EXTRA SMALL SCREENS (Phones) --- */
    @media (max-width: 480px) {
      .banner {
        font-size: 2.2px !important;
        line-height: 2.5px !important;
      }
      #banner-animation {
        width: 50px !important;
        height: 50px !important;
      }
      .prompt, input, #terminal, #boot-screen {
        font-size: 11px;
      }
    }
    .skills-grid {
      display: grid !important;
      grid-template-columns: repeat(6, 1fr) !important;
      gap: 10px !important;
      max-width: 580px !important;
    }

    @media (max-width: 600px) {
      .skills-grid {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }
  </style>
</head>
<body>
  <div class="crt-screen">
    <div id="boot-screen"></div>
    <div id="terminal"></div>
  </div>

  <script src="terminal.js"></script>
<script src="music-player.js"></script>

<script>
  // --- GIF RESTART WITH THROTTLE ---
  let gifThrottle = false;

  function restartGif(e) {
    if (e.target && e.target.id === "banner-animation") {
      if (gifThrottle) return;
      gifThrottle = true;
      e.target.src = "portrait.gif?t=" + new Date().getTime();
      setTimeout(() => { gifThrottle = false; }, 1000);
    }
  }

  document.addEventListener("mouseover", restartGif);
  document.addEventListener("touchstart", restartGif, { passive: true });
</script>

</body>
</html>

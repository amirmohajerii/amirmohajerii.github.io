<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A Mohajeri</title>

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.webp">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0d0d0d;
      color: #c0c0c0;
      font-family: "JetBrains Mono", monospace;
      font-weight: 500;
      line-height: 1.4;
      font-size: 16px;
      overflow: hidden;
      height: 100vh;
    }

    .crt-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #0d0d0d;
      overflow: hidden;
    }

    #boot-screen {
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      font-size: 14px;
      color: #999;
    }

    #terminal {
      padding: 20px;
      padding-bottom: 72px;
      height: 100vh;
      overflow-y: auto;
      white-space: pre-wrap;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1;
      display: none;
    }

    #terminal::-webkit-scrollbar, #boot-screen::-webkit-scrollbar {
      width: 8px;
    }

    #terminal::-webkit-scrollbar-track, #boot-screen::-webkit-scrollbar-track {
      background: #0d0d0d;
    }

    #terminal::-webkit-scrollbar-thumb, #boot-screen::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    #terminal::-webkit-scrollbar-thumb:hover, #boot-screen::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .line {
      display: flex;
      position: relative;
      z-index: 1;
    }

    .prompt {
      margin-right: 5px;
      white-space: nowrap;
      color: #e0e0e0;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      caret-color: #e0e0e0;
      caret-shape: block;
    }

    input:focus {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { caret-color: #e0e0e0; }
      50% { caret-color: transparent; }
    }

    img {
      max-width: 400px;
      display: block;
      margin-top: 5px;
    }

    .banner {
      font-family: 'JetBrains Mono', monospace;
      font-size:11px;
      line-height:11px;
      white-space: pre;
      display:inline-block;
      font-weight:700;
      letter-spacing:-0.4px;
      text-shadow:
        0 0 2px rgba(255,255,255,.25),
        0 0 8px rgba(59,130,246,.35),
        0 0 16px rgba(59,130,246,.15);
    }

    @keyframes screenFlash {
      0% { background: #0d0d0d; }
      50% { background: #ddd; }
      100% { background: #0d0d0d; }
    }

    .banner-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 30px;
    }

    .banner-image {
      width: 120px;
      height: 120px;
      border: 2px solid #3b82f6;
      border-radius: 4px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }

    .flash {
      animation: screenFlash 0.1s;
    }

    @media (max-width: 768px) {
      #terminal, #boot-screen {
        font-size: 12px;
        padding: 10px;
        padding-bottom: 64px;
      }
      img {
        max-width: 100%;
      }
    }
  </style>
</head>

    function prompt() {
      const div = document.createElement("div");
      div.className = "line";

      const p = document.createElement("span");
      p.className = "prompt";
      p.textContent = `user@site:${cwd}$`;

      const input = document.createElement("input");
      input.autofocus = true;

      input.onkeydown = e => {
        if (e.key === "Enter") {
          const cmd = input.value;
          div.removeChild(input);
          div.textContent += cmd;
          handleCommand(cmd.trim());
        }
      };

      div.appendChild(p);
      div.appendChild(input);
      terminal.appendChild(div);
      input.focus();
    }

    function handleCommand(cmd) {
      if (!cmd) return prompt();

      let args = cmd.split(" ");
      let base = args[0];

      switch (base) {
        case "ls":
          ls();
          break;
        case "cd":
          cd(args[1]);
          break;
        case "cat":
          cat(args[1]);
          break;
        case "pwd":
          print(cwd);
          break;
        case "clear":
          terminal.innerHTML = "";
          printBanner();
          break;
        case "help":
          help();
          break;
        case "donut":
          donut();
          break;
        case "exit":
          stopProcess();
          break;
        case "music":
        case "musicplayer":
          const bar = document.getElementById("music-player-bar");
          if (bar) {
            bar.style.display = "flex";
            print("Music player opened.");
          } else {
            print("Music player not found. Is music-player.js loaded?");
          }
          break;
        default:
          print(`command not found: ${base}`);
      }

      prompt();
    }

    function stopProcess() {
      if (activeProcess) {
        clearInterval(activeProcess);
        activeProcess = null;
        print("Process terminated.");
      }
    }

    document.addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "c") {
        stopProcess();
        prompt();
      }
    });

    // Click anywhere to focus input
    document.addEventListener("click", (e) => {
      if (e.target.closest("#music-player-bar")) return;
      const inputs = terminal.querySelectorAll("input");
      if (inputs.length > 0) {
        inputs[inputs.length - 1].focus();
      }
    });

    function ls() {
      let dir = getDir(cwd);
      print(Object.keys(dir).join("    "));
    }

    function cd(path) {
      if (!path || path === "~") {
        cwd = "/home";
        return;
      }
      if (path.startsWith("../")) {
        let ups = path.split("/").filter(p => p === "..").length;
        let parts = cwd.split("/").filter(Boolean);
        parts = parts.slice(0, parts.length - ups);
        cwd = "/" + parts.join("/");
        if (cwd === "/") cwd = "/home";
        return;
      }
      if (path === "..") {
        let parts = cwd.split("/").filter(Boolean);
        parts.pop();
        cwd = "/" + parts.join("/");
        if (cwd === "/") cwd = "/home";
        return;
      }
      let newPath = cwd + "/" + path;
      try {
        let d = getDir(newPath);
        if (typeof d === "object") cwd = newPath;
        else print("Not a directory");
      } catch {
        print("No such directory");
      }
    }

    function cat(file) {
      let dir = getDir(cwd);
      if (!dir[file]) return print("No such file");
      let content = dir[file];
      if (content.endsWith?.(".webp")) {
        let img = document.createElement("img");
        img.src = content;
        terminal.appendChild(img);
      } else {
        print(content);
      }
    }

    function donut() {
      if (activeProcess) clearInterval(activeProcess);
      let A = 0, B = 0;
      const width = 40, height = 22;
      const chars = ".,-~:;=!*#$@";
      activeProcess = setInterval(() => {
        let z = Array(width * height).fill(0);
        let b = Array(width * height).fill(" ");
        for (let j = 0; j < 6.28; j += 0.07) {
          for (let i = 0; i < 6.28; i += 0.02) {
            let c = Math.sin(i), d = Math.cos(j);
            let e = Math.sin(A), f = Math.sin(j);
            let g = Math.cos(A), h = d + 2;
            let D = 1 / (c * h * e + f * g + 5);
            let l = Math.cos(i), m = Math.cos(B), n = Math.sin(B);
            let t = c * h * g - f * e;
            let x = Math.floor(width / 2 + 30 * D * (l * h * m - t * n));
            let y = Math.floor(height / 2 + 15 * D * (l * h * n + t * m));
            let o = x + width * y;
            let N = Math.floor(8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n));
            if (y >= 0 && y < height && x >= 0 && x < width && D > z[o]) {
              z[o] = D;
              b[o] = chars[Math.max(0, N)];
            }
          }
        }
        let output = "";
        for (let k = 0; k < width * height; k++) {
          output += k % width === 0 ? "\n" : b[k];
        }
        terminal.innerHTML = `<pre>${output}</pre>`;
        A += 0.04;
        B += 0.02;
      }, 50);
    }
